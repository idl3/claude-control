name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json
            packages/agent-ui-kit/package-lock.json

      # Backend (Node built-in test runner). The suite is hermetic — no tmux,
      # ffmpeg, or whisper are required (create-session + transcribe tests stub
      # their externals). Runs via `npm test` (scoped to test/*.test.js) rather
      # than a bare `node --test` — bare recursive discovery also picks up
      # collab-engine/'s own `*.test.ts` files, a separate sub-package with its
      # own tsx-loader test script, once Node's default test glob includes .ts.
      - name: Install backend deps
        run: npm ci

      - name: Backend tests
        run: npm test

      # Kit (@idl3/agent-ui-kit): build + its own suite gate every PR — not just
      # the tag-triggered publish workflow. web's file: dep needs the kit's
      # dist/ built before web's build resolves the package exports.
      - name: Install kit deps
        working-directory: packages/agent-ui-kit
        run: npm ci

      - name: Kit build
        working-directory: packages/agent-ui-kit
        run: npm run build

      - name: Kit tests
        working-directory: packages/agent-ui-kit
        run: npm test

      # Web (Vite build + Vitest).
      - name: Install web deps
        working-directory: web
        run: npm ci

      - name: Web build
        working-directory: web
        run: npm run build

      - name: Web tests
        working-directory: web
        run: npx vitest run
